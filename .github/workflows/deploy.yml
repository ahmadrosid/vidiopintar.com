name: Build and Deploy

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ahmadrosid
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
            context: .
            file: ./Dockerfile
            push: true
            tags: ghcr.io/${{ github.repository }}:latest
            cache-from: type=gha
            cache-to: type=gha,mode=max
            build-args: |
              DB_PASSWORD=${{ secrets.DB_PASSWORD }}
              DB_USER=${{ secrets.DB_USER }}
              DB_HOST=${{ secrets.DB_HOST }}
              DB_PORT=${{ secrets.DB_PORT }}
              DB_NAME=${{ secrets.DB_NAME }}
              OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
              GOOGLE_GENERATIVE_AI_API_KEY=${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
              NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
              GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
              GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
              BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}
              BETTER_AUTH_URL=${{ vars.BETTER_AUTH_URL }}
              API_BASE_URL=${{ secrets.API_BASE_URL }}
              API_X_HEADER_API_KEY=${{ secrets.API_X_HEADER_API_KEY }}

      - name: VPS install ssh keys
        # check this thread to understand why its needed:
        # https://stackoverflow.com/a/70447517
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_rsa
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          ssh-keyscan -H vidiopintar.com > ~/.ssh/known_hosts
      - name: Connect, pull and deploy
        run: |
          ssh root@vidiopintar.com << 'EOF'
            set -e
            export PATH="$HOME/.bun/bin:$PATH"
            cd /root/vidiopintar.com
            git checkout main
            git pull origin main || (sleep 15 && git pull origin main) || (sleep 30 && git pull origin main)
            bun ./deployment/deploy.ts
          EOF
      - name: cleanup
        run: rm -rf ~/.ssh
